<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusSpeak AI</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Login CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}?v=1">
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <!-- Gradient Orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        
        <!-- Particles Container -->
        <div class="particles-container" id="particlesContainer"></div>
        
        <!-- Cursor-Following Glow -->
        <div class="cursor-glow-login" id="cursorGlow"></div>
    </div>

    <!-- Content Container -->
    <div class="login-container">
        <!-- Logo & Branding Section -->
        <div class="branding-section">
            <!-- Animated Icon -->
            <div class="icon-wrapper">
                <i class="fas fa-microphone-alt"></i>
            </div>
            
            <!-- Main Title -->
            <div class="title-section">
                <h1 class="main-title">
                    <span class="title-word">AI</span>
                    <span class="title-word">Presentation</span>
                    <span class="title-word">Coach</span>
                </h1>
                <p class="subtitle">Master Your Public Speaking Skills</p>
            </div>
        </div>

        <!-- Login Form Card -->
        <div class="login-card">
            <div class="card-content">
                <!-- Form Header -->
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="login-form">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="you@example.com"
                                required
                            >
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <div class="label-row">
                            <label for="password">Password</label>
                            <a href="#" class="forgot-link">Forgot?</a>
                        </div>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="••••••••"
                                required
                            >
                            <button type="button" class="toggle-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me Checkbox -->
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me for 30 days</label>
                    </div>

                    <!-- Sign In Button -->
                    <button type="submit" class="sign-in-btn">
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <!-- Error Message -->
                    <div id="errorMessage" class="error-message"></div>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <!-- Social Login Buttons -->
                <div class="social-buttons">
                    <button class="social-btn google-btn" id="googleBtn" disabled title="Coming soon">
                        <i class="fab fa-google"></i>
                        <span>Google</span>
                    </button>
                    <button class="social-btn github-btn" id="githubBtn" disabled title="Coming soon">
                        <i class="fab fa-github"></i>
                        <span>GitHub</span>
                    </button>
                </div>

                <!-- Sign Up Link -->
                <div class="signup-link">
                    <p>Don't have an account? <a href="#" class="link-text">Sign up for free</a></p>
                </div>

                <!-- Demo Button -->
                <div style="margin-top: 16px; text-align: center;">
                    <a href="/demo" class="demo-link">
                        <i class="fas fa-rocket"></i> Try Demo
                    </a>
                </div>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="loading-indicator">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/login.js') }}?v=1"></script>
</body>
</html>
